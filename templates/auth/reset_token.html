{% extends "base.html" %}
{% block title %}Set new password — SmartBook Pro{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="sb-card sb-card-body">
      <h1 class="h4 mb-2"><i class="bi bi-key me-2 text-primary"></i>Choose a new password</h1>
      <p class="text-muted small mb-4">This link is valid for 1 hour and can be used only once.</p>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">New password</label>
          <input type="password" name="new_password" class="form-control" required minlength="6" maxlength="128" autofocus/>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm password</label>
          <input type="password" name="confirm" class="form-control" required minlength="6" maxlength="128"/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Set password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
