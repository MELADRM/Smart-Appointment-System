{% extends "base.html" %}
{% block title %}Login — SmartBook Pro{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5 col-lg-4">
<div class="sb-card sb-card-body mt-4">
  <div class="text-center mb-4"><i class="bi bi-calendar-heart-fill text-primary" style="font-size:2rem"></i><h3 class="fw-bold mt-2 mb-1">Welcome Back</h3><p class="text-muted small">Sign in to your SmartBook account</p></div>
  <form method="POST">
    <div class="mb-3"><label class="form-label">Emial</label><input type="email" name="email" class="form-control" placeholder="you@example.com" required/></div>
    <div class="mb-4"><label class="form-label">Password</label><input type="password" name="password" class="form-control" placeholder="••••••••" required/></div>
    <button type="submit" class="btn btn-primary w-100">Sign In <i class="bi bi-arrow-right ms-1"></i></button>
  </form>
  <hr class="my-3"/>
  <div class="text-center small">
    <a href="{{ url_for('forgot_password') }}" class="text-muted">Forgot password?</a> &nbsp;·&nbsp;
    <a href="{{ url_for('register') }}" class="text-primary fw-semibold">Create account</a>
  </div>
</div>
</div></div>
{% endblock %}
